<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>YouTube Chat</h1>
            <p class="subtitle">Ask questions about this video</p>
        </div>

        <!-- Status Section -->
        <div id="statusSection" class="status-section">
            <div class="status-message" id="statusMessage">
                <span class="spinner"></span>
                <span id="statusText">Loading...</span>
            </div>
        </div>

        <!-- Initialize Section (shown when not initialized) -->
        <div id="initSection" style="display: none;">
            <button id="initButton" class="btn btn-primary">Initialize Vector Store</button>
            <p class="help-text">Click to create a searchable index of this video's transcript</p>
        </div>

        <!-- Chat Section (shown when initialized) -->
        <div id="chatSection" style="display: none;">
            <!-- Messages Display -->
            <div id="messagesContainer" class="messages-container">
                <div class="welcome-message">
                    <p><strong>Ready to ask questions!</strong></p>
                    <p>Type your question below to get answers from the video transcript.</p>
                </div>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="questionInput" 
                        placeholder="Ask a question about the video..."
                        class="question-input"
                    >
                    <button id="askButton" class="btn btn-ask">Ask</button>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <button id="resetButton" class="btn btn-secondary">Reset</button>
                <span class="video-id" id="videoId"></span>
            </div>
        </div>

        <!-- Error Section -->
        <div id="errorSection" class="error-section" style="display: none;">
            <p id="errorMessage"></p>
            <button id="retryButton" class="btn btn-primary">Try Again</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
